<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Jornadas académicas U.E.B.</title>

<style>

/* ============================= */
/* 🔹 ESTILOS GENERALES */
/* ============================= */
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  background: #f5f5f5;
}

/* ============================= */
/* 🔹 PORTADA */
/* ============================= */
.header {
  background: url('JORNADAS/universidad_evanglica_boliviana_cover.jpg') center/cover no-repeat;
  color: white;
  padding: 100px 20px;
}

/* 🔴 Línea decorativa */
.line {
  width: 200px;
  height: 5px;
  background: red;
  margin: 10px auto;
}

/* ============================= */
/* 🔹 CONTENEDOR RESPONSIVE (GRID) */
/* ============================= */
.container {
  display: grid;

  /* 🔥 ESTO ES LA CLAVE */
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

  gap: 20px;
  padding: 30px;
}

/* ============================= */
/* 🔹 TARJETAS */
/* ============================= */
.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* 🖼️ IMÁGENES UNIFORMES */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 8px;
}

/* TEXTO */
.card h3 {
  margin: 10px 0 5px;
}

.card p {
  font-size: 14px;
}

/* ============================= */
/* 🔹 BOTONES */
/* ============================= */
button {
  margin-top: 10px;
  padding: 10px 15px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: red;
}

</style>
</head>

<body>

<!-- ============================= -->
<!-- 🔹 PORTADA -->
<!-- ============================= -->
<div class="header">
  <h1>JORNADAS ACADÉMICAS U.E.B.</h1>
  <div class="line"></div>
</div>

<!-- ============================= -->
<!-- 🔹 CONTENEDOR DE TARJETAS -->
<!-- ============================= -->
<div class="container">

  <!-- 🔹 EJEMPLO 1 -->
  <div class="card">
    <img src="JORNADAS/Farmacia/Frontis Farmacia.jpg">
    <h3>FARMACIA</h3>
    <p>Proyecto académico del área de salud.</p>
    <button onclick="location.href='farmacia.html'">Ver</button>
  </div>

  <!-- 🔹 EJEMPLO 2 -->
  <div class="card">
    <img src="JORNADAS/colegio1/img.jpg">
    <h3>COLEGIO 1</h3>
    <p>Participación en jornadas académicas.</p>
    <button onclick="location.href='colegio1.html'">Ver</button>
  </div>

  <!-- 🔹 EJEMPLO 3 -->
  <div class="card">
    <img src="JORNADAS/colegio2/img.jpg">
    <h3>COLEGIO 2</h3>
    <p>Presentación de proyectos innovadores.</p>
    <button onclick="location.href='colegio2.html'">Ver</button>
  </div>

</div>

</body>
</html>
