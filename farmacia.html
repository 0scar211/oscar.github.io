<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Farmacia - Jornadas UEB</title>

<style>

/* ============================= */
/* 🔹 ESTILOS GENERALES */
/* ============================= */
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
}

/* ============================= */
/* 🔹 PORTADA */
/* ============================= */
.header {
  background: url('JORNADAS/Farmacia/Frontis Farmacia.jpg') center/cover no-repeat;
  color: white;
  padding: 100px 20px;
}

.line {
  width: 200px;
  height: 5px;
  background: red;
  margin: 10px auto;
}

/* ============================= */
/* 🔹 BOTÓN VOLVER */
/* ============================= */
.back {
  margin: 20px;
}

.back button {
  padding: 10px 15px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.back button:hover {
  background: red;
}

/* ============================= */
/* 🔹 CARRUSEL */
/* ============================= */
.carousel {
  position: relative;
  max-width: 800px;
  margin: auto;
  overflow: hidden;
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Contenedor interno */
.slides {
  display: flex;
  transition: transform 0.5s ease;
}

/* Cada slide */
.slide {
  min-width: 100%;
}

/* Imagen */
.slide img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* Descripción */
.caption {
  padding: 10px;
}

/* Botones */
.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: black;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

.prev:hover, .next:hover {
  background: red;
}

</style>
</head>

<body>

<!-- ============================= -->
<!-- 🔹 PORTADA -->
<!-- ============================= -->
<div class="header">
  <h1>FARMACIA</h1>
  <div class="line"></div>
</div>

<!-- 🔙 BOTÓN VOLVER -->
<div class="back">
  <button onclick="location.href='index.html'">← Volver</button>
</div>

<!-- ============================= -->
<!-- 🔹 CARRUSEL -->
<!-- ============================= -->
<div class="carousel">

  <div class="slides" id="slides">

    <!-- 🔹 IMAGEN 1 -->
    <div class="slide">
      <img src="JORNADAS/Farmacia/Estanteria Medicamentos.jpg">
      <div class="caption">Área de atención al cliente.</div>
    </div>

    <!-- 🔹 IMAGEN 2 -->
    <div class="slide">
      <img src="JORNADAS/Farmacia/Medicamentos.png">
      <div class="caption">Exposición de medicamentos.</div>
    </div>

    <!-- 🔹 IMAGEN 3 -->
    <div class="slide">
      <img src="JORNADAS/Farmacia/Productos Terbol en Estantes.jpg">
      <div class="caption">Equipo de trabajo.</div>
    </div>

    <!-- 🔹 IMAGEN 4 -->
    <div class="slide">
      <img src="JORNADAS/Farmacia/VentaRemedios.jpg">
      <div class="caption">Instalaciones modernas.</div>
    </div>

  </div>

  <!-- BOTONES -->
  <button class="prev" onclick="moveSlide(-1)">❮</button>
  <button class="next" onclick="moveSlide(1)">❯</button>

</div>

<!-- ============================= -->
<!-- 🔹 SCRIPT CARRUSEL -->
<!-- ============================= -->
<script>

let index = 0;

function moveSlide(step) {
  const slides = document.getElementById("slides");
  const total = slides.children.length;

  index += step;

  if (index < 0) index = total - 1;
  if (index >= total) index = 0;

  slides.style.transform = "translateX(-" + (index * 100) + "%)";
}

</script>

</body>
</html>
