<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Farmacia</title>

<style>

/* ============================= */
/* 🔹 GENERAL */
/* ============================= */
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
}

/* ============================= */
/* 🔹 PORTADA */
/* ============================= */
.header {
  background: url('JORNADAS/Farmacia/Estanteria Medicamentos.jpg') center/cover no-repeat;
  color: white;
  padding: 100px 20px;
}

/* 🔥 TITULO CON RECTÁNGULO */
.header h1 {
  display: inline-block;
  background: #333; /* plomo oscuro */
  color: white;
  padding: 15px 30px;
  border-radius: 8px;
}

.line {
  width: 200px;
  height: 5px;
  background: red;
  margin: 10px auto;
}

/* ============================= */
/* 🔹 BOTÓN VOLVER */
/* ============================= */
.back button {
  margin: 20px;
  padding: 10px 15px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.back button:hover {
  background: red;
}

/* ============================= */
/* 🔹 CARRUSEL PRO */
/* ============================= */
.carousel {
  width: 100%;
  overflow: hidden;
  position: relative;
  margin-top: 20px;
}

/* CONTENEDOR */
.track {
  display: flex;
  gap: 20px;
  transition: transform 0.5s ease;
  padding: 20px;
}

/* CADA TARJETA */
.slide {
  min-width: 70%; /* 👈 clave para ver laterales */
  flex-shrink: 0;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

/* IMAGEN */
.slide img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* TEXTO */
.caption {
  padding: 10px;
  font-size: 14px;
}

/* BOTONES */
.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: black;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  opacity: 0.7;
}

.btn:hover {
  background: red;
}

.prev { left: 10px; }
.next { right: 10px; }

/* ============================= */
/* 🔹 RESPONSIVE */
/* ============================= */
@media (max-width: 768px) {
  .slide {
    min-width: 85%;
  }

  .slide img {
    height: 200px;
  }
}

</style>
</head>

<body>

<!-- ============================= -->
<!-- 🔹 PORTADA -->
<!-- ============================= -->
<div class="header">
  <h1>FARMACIA</h1>
  <div class="line"></div>
</div>

<!-- 🔙 BOTÓN -->
<div class="back">
  <button onclick="location.href='index.html'">← Volver</button>
</div>

<!-- ============================= -->
<!-- 🔹 CARRUSEL -->
<!-- ============================= -->
<div class="carousel">

  <div class="track" id="track">

    <!-- 🔹 SLIDE 1 -->
    <div class="slide">
      <img src="JORNADAS/Farmacia/Estanteria Medicamentos.jpg">
      <div class="caption">Área de atención al cliente.</div>
    </div>

    <!-- 🔹 SLIDE 2 -->
    <div class="slide">
      <img src="JORNADAS/Farmacia/Medicamentos.png">
      <div class="caption">Exposición de medicamentos.</div>
    </div>

    <!-- 🔹 SLIDE 3 -->
    <div class="slide">
      <img src="JORNADAS/Farmacia/Productos Terbol en Estantes.jpg">
      <div class="caption">Equipo de trabajo.</div>
    </div>

    <!-- 🔹 SLIDE 4 -->
    <div class="slide">
      <img src="JORNADAS/Farmacia/img4.jpg">
      <div class="caption">Instalaciones modernas.</div>
    </div>

  </div>

  <!-- BOTONES -->
  <button class="btn prev" onclick="move(-1)">❮</button>
  <button class="btn next" onclick="move(1)">❯</button>

</div>

<!-- ============================= -->
<!-- 🔹 SCRIPT AUTOMÁTICO */
/* ============================= -->
<script>

let index = 0;
const track = document.getElementById("track");
const slides = document.querySelectorAll(".slide");

function updateCarousel() {
  const width = slides[0].offsetWidth + 20; // ancho + gap
  track.style.transform = `translateX(-${index * width}px)`;
}

function move(step) {
  index += step;

  if (index < 0) index = slides.length - 1;
  if (index >= slides.length) index = 0;

  updateCarousel();
}

/* 🔥 AUTOMÁTICO CADA 5 SEG */
setInterval(() => {
  move(1);
}, 5000);

/* AJUSTE AL REDIMENSIONAR */
window.addEventListener("resize", updateCarousel);

</script>

</body>
</html>
